name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  actions: read

env:
  GO_VERSION: '1.21'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go_backend/go.sum

      # ── Generate CHANGELOG ───────────────────────────────────────────
      - name: Install git-chglog
        run: go install github.com/git-chglog/git-chglog/cmd/git-chglog@latest

      - name: Generate CHANGELOG
        id: changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          CHANGELOG=$(~/go/bin/git-chglog --no-color "${TAG_NAME}..HEAD" 2>/dev/null || \
                      ~/go/bin/git-chglog --no-color 2>/dev/null || \
                      echo "See commits for details")
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Download all platform artifacts ─────────────────────────────
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: binary-*
          merge-multiple: true

      - name: Rename artifacts for release
        run: |
          cd artifacts/
          # Windows: rename .exe.zip to .zip if needed
          for f in *.zip; do
            [ -f "$f" ] || continue
            echo "Archive: $f"
            unzip -l "$f" 2>/dev/null || true
          done
          ls -la

      # ── Upload Linux artifacts (needed for deploy) ─────────────────
      - name: Upload Linux amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-linux-amd64
          path: artifacts/pingjiao-linux-amd64.tar.gz
          retention-days: 90

      - name: Upload Linux arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-linux-arm64
          path: artifacts/pingjiao-linux-arm64.tar.gz
          retention-days: 90

      - name: Upload macOS amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-darwin-amd64
          path: artifacts/pingjiao-darwin-amd64.tar.gz
          retention-days: 90

      - name: Upload macOS arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-darwin-arm64
          path: artifacts/pingjiao-darwin-arm64.tar.gz
          retention-days: 90

      - name: Upload Windows amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-windows-amd64
          path: artifacts/pingjiao-windows-amd64.zip
          retention-days: 90

      # ── Create GitHub Release ───────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ github.run_id }}-changelog.txt
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: false
          files: |
            artifacts/pingjiao-linux-amd64.tar.gz
            artifacts/pingjiao-linux-arm64.tar.gz
            artifacts/pingjiao-darwin-amd64.tar.gz
            artifacts/pingjiao-darwin-arm64.tar.gz
            artifacts/pingjiao-windows-amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Save changelog content to a file for body_path
      - name: Prepare changelog body
        run: |
          echo "${{ steps.changelog.outputs.changelog }}" > ${{ github.run_id }}-changelog.txt
