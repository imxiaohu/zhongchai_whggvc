bin: git
style: github
template: CHANGELOG.tpl.md
info:
  title: Changelog
  repository_url: https://github.com/imxiaohu/pingjiao
options:
  commits:
    filters:
      Type:
        - feat
        - fix
        - perf
        - refactor
        - docs
        - style
        - test
        - chore
        - revert
  commit_groups:
    title_maps:
      feat: ✨ 新增
      fix: 🐛 修复
      perf: ⚡ 性能
      refactor: ♻️ 重构
      docs: 📝 文档
      style: 💄 样式
      test: ✅ 测试
      chore: 🔧 维护
      revert: ⏪ 回退
  header:
    pattern: "^(\\w+)(?:\\(([\\w\\$\\.\\-\\*\\s]+)\\))?\\:\\s(.*)$"
    pattern_maps:
      - Type
      - Scope
      - Subject
  commits_limit: 50
  footer:
    pattern: "^\\[?(?:Feat|Fix|Perf|Refactor|Docs|Style|Test|Chore|Revert)\\:?\\]?\\s?#([0-9]+)"
    replace_pattern: "\n\n见 [#$1](https://github.com/imxiaohu/pingjiao/issues/$1)"
  notes:
    keywords:
      - "BREAKING CHANGE"
    rows: 2
